name: rifq_v2
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  auto_route: ^11.1.0
  bloc: ^9.2.1
  carousel_slider: ^5.1.2
  cupertino_icons: ^1.0.9
  dart_mappable: ^4.8.0
  device_info_plus: ^13.1.0
  dio: ^5.9.2
  easy_localization: ^3.0.8
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.1
  flutter_form_builder: ^10.3.0+2
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^10.3.1
  flutter_svg: ^2.3.0
  form_builder_validators: ^11.3.0
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  get_storage: ^2.1.1
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  image_picker: ^1.2.2
  injectable: ^3.0.0
  json_annotation: ^4.12.0
  loading_animation_widget: ^1.3.0
  lottie: ^3.4.0
  multiple_result: ^5.3.0
  package_info_plus: ^10.1.0
  pinput: ^6.0.2
  sizer: ^3.1.3
  supabase_flutter: ^2.15.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^4.0.0-dev.3
  injectable_generator: ^3.1.0
  json_serializable: ^6.14.0
  auto_route_generator: ^10.6.0
  

flutter:
  assets:
    - assets/icon/
    - assets/images/
    - assets/translations/
    - .env
    - assets/splash/
    - assets/lottie/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
  uses-material-design: true